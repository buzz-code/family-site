version: "3.8"

services:
  family-site:
    image: family-site:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:3000"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=file:./prisma/dev.db
      - NEXTAUTH_URL=http://62.238.4.145:8090
      - NEXTAUTH_SECRET=testsecret12345678901234567890
    networks:
      - family-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  family-network:
    driver: overlay
    attachable: true
